data:
  datasets: datasets/mvtec_anomaly_detection

params:
  backbone: resnet18
  layers: ["layer1", "layer2", "layer3"] # to adjust for memory cost.  [layer1,2,3] -> default value from Papers [64+128+256] = n dim
  seed: 42
  cudnn_deterministic: true
  device: cpu
  input_size: 256 # https://anomalib.readthedocs.io/en/v1.0.0/markdown/guides/reference/models/image/{padim.html, stfpm.html}

paths:
  figures_dir: outputs/figures
  logs_dir: outputs/logs
  models_dir: outputs/models
  reports_dir: outputs/reports
